<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 1024 1024" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Frontend Design</title>
  <desc id="desc">The DotCraft robot with a small interface canvas in front.</desc>
  <defs>
    <linearGradient id="blue" x1="279" y1="766" x2="736" y2="334" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2458F7"/>
      <stop offset=".46" stop-color="#5F82F7"/>
      <stop offset="1" stop-color="#8FA5FF"/>
    </linearGradient>
    <linearGradient id="mark" x1="380" y1="696" x2="492" y2="557" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2257F5"/>
      <stop offset=".55" stop-color="#577DF7"/>
      <stop offset="1" stop-color="#8CA2FF"/>
    </linearGradient>
    <linearGradient id="yellow" x1="481" y1="174" x2="617" y2="713" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFCF11"/>
      <stop offset="1" stop-color="#F6B500"/>
    </linearGradient>
    <linearGradient id="rose" x1="585" y1="651" x2="855" y2="342" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#BE123C"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="soft" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0b3d62" flood-opacity=".18"/>
    </filter>
    <filter id="lift" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#163a88" flood-opacity=".1"/>
    </filter>
    <filter id="canvas-shadow" x="-16%" y="-16%" width="132%" height="132%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#7f1d1d" flood-opacity=".2"/>
    </filter>
  </defs>
  <g transform="translate(-40 70) rotate(-5 512 612) scale(.9)">
    <g filter="url(#soft)">
      <rect x="201" y="365" width="622" height="513" rx="151" fill="#fff"/>
      <rect x="165" y="472" width="136" height="256" rx="58" fill="#fff"/>
      <rect x="723" y="472" width="136" height="256" rx="58" fill="#fff"/>
      <rect x="438" y="270" width="148" height="182" rx="2" fill="#fff"/>
      <circle cx="512" cy="229" r="116" fill="#fff"/>
    </g>
    <g filter="url(#lift)">
      <rect x="243" y="408" width="538" height="426" rx="113" fill="url(#blue)"/>
      <rect x="188" y="514" width="90" height="171" rx="19" fill="url(#blue)"/>
      <rect x="746" y="514" width="90" height="171" rx="19" fill="url(#blue)"/>
      <rect x="479" y="337" width="66" height="119" rx="6" fill="url(#blue)"/>
    </g>
    <rect x="295" y="464" width="434" height="315" rx="78" fill="#fff"/>
    <circle cx="512" cy="229" r="73" fill="url(#yellow)"/>
    <path d="M387 568 477 634 387 700" stroke="url(#mark)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M531 696h116" stroke="url(#yellow)" stroke-width="27" stroke-linecap="round"/>
  </g>
  <g transform="rotate(7 722 493)" filter="url(#canvas-shadow)">
    <rect x="562" y="326" width="354" height="292" rx="44" fill="#fff" stroke="#fff" stroke-width="30"/>
    <rect x="562" y="326" width="354" height="292" rx="44" fill="#fff" stroke="url(#rose)" stroke-width="12"/>
    <rect x="606" y="374" width="266" height="49" rx="24.5" fill="url(#rose)"/>
    <rect x="606" y="458" width="112" height="104" rx="20" fill="#2458F7"/>
    <rect x="746" y="458" width="126" height="40" rx="20" fill="#F6B500"/>
    <rect x="746" y="524" width="86" height="38" rx="19" fill="#94A3B8"/>
    <circle cx="858" cy="543" r="24" fill="#E11D48"/>
  </g>
