<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Agent Builder plugin icon</title>
  <desc id="desc">The DotCraft robot with an indigo body, a friendly face, and a create sparkle.</desc>
  <defs>
    <linearGradient id="role-body" x1="279" y1="766" x2="736" y2="334" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset=".5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b8ff8"/>
    </linearGradient>
    <linearGradient id="role-mark" x1="366" y1="694" x2="658" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3730a3"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="yellow" x1="481" y1="174" x2="617" y2="713" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffcf11"/>
      <stop offset="1" stop-color="#f6b500"/>
    </linearGradient>
    <filter id="soft-shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1e1b4b" flood-opacity=".18"/>
    </filter>
    <filter id="inner-lift" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1e1b4b" flood-opacity=".12"/>
    </filter>
    <filter id="accessory-lift" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity=".18"/>
    </filter>
  </defs>

  <g transform="translate(512 528) scale(1.05) translate(-512 -512)">
    <g filter="url(#soft-shadow)">
      <rect x="201" y="365" width="622" height="513" rx="151" fill="#fff"/>
      <rect x="145" y="472" width="136" height="256" rx="58" fill="#fff"/>
      <rect x="743" y="472" width="136" height="256" rx="58" fill="#fff"/>
      <rect x="438" y="270" width="148" height="182" rx="2" fill="#fff"/>
      <circle cx="512" cy="229" r="116" fill="#fff"/>
    </g>

    <g filter="url(#inner-lift)">
      <rect x="243" y="408" width="538" height="426" rx="113" fill="url(#role-body)"/>
      <rect x="188" y="514" width="90" height="171" rx="19" fill="url(#role-body)"/>
      <rect x="746" y="514" width="90" height="171" rx="19" fill="url(#role-body)"/>
      <rect x="479" y="337" width="66" height="119" rx="6" fill="url(#role-body)"/>
    </g>

    <rect x="295" y="464" width="434" height="315" rx="78" fill="#fff"/>
    <circle cx="512" cy="229" r="73" fill="url(#yellow)"/>

    <path d="M379 585 452 622 379 659" stroke="url(#role-mark)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M645 585 572 622 645 659" stroke="url(#role-mark)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M482 704c18 11 42 11 60 0" stroke="url(#role-mark)" stroke-width="22" stroke-linecap="round" fill="none"/>
  </g>

  <g filter="url(#accessory-lift)">
    <path d="M700 372 716 414 758 430 716 446 700 488 684 446 642 430 684 414Z" fill="url(#role-mark)" stroke="#fff" stroke-width="26" stroke-linejoin="round"/>
    <path d="M842 150 884 258 992 300 884 342 842 450 800 342 692 300 800 258Z" fill="url(#yellow)" stroke="#fff" stroke-width="38" stroke-linejoin="round"/>
    <path d="M842 150 884 258 992 300 884 342 842 450 800 342 692 300 800 258Z" fill="url(#yellow)" stroke="url(#role-mark)" stroke-width="10" stroke-linejoin="round"/>
  </g>
</svg>
